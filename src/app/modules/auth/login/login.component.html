<div class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <h2>CarApp</h2>
            <p>Sign in to your account</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" formControlName="username" placeholder="Enter username" [class.is-invalid]="f['username'].invalid && 
                               f['username'].touched" />
                <div class="error-msg" *ngIf="f['username'].invalid && f['username'].touched">
                    <span *ngIf="f['username'].errors?.['required']">
                        Username is required
                    </span>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" formControlName="password" placeholder="Enter password" [class.is-invalid]="f['password'].invalid && 
                               f['password'].touched" />
                <div class="error-msg" *ngIf="f['password'].invalid && f['password'].touched">
                    <span *ngIf="f['password'].errors?.['required']">
                        Password is required
                    </span>
                    <span *ngIf="f['password'].errors?.['minlength']">
                        Password must be at least 6 characters
                    </span>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login" [disabled]="isLoading">
                {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>

        </form>

    </div>
</div>
